<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>SportConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --blue: #0057FF;
        --blue-light: #1a6aff;
        --cyan: #00E5FF;
        --dark: #0a0e1a;
        --dark2: #0f1524;
        --dark3: #151c2e;
        --dark4: #1c2540;
        --text: #ffffff;
        --text2: #8892a4;
        --text3: #4a5568;
        --success: #00E676;
        --warning: #FFB300;
        --danger: #FF3D57;
        --radius: 16px;
        --shadow: 0 8px 32px rgba(0, 87, 255, 0.15);
        --font-display: 'Barlow Condensed', sans-serif;
        --font-body: 'Barlow', sans-serif;
      }

      html { scroll-behavior: smooth; }

      body {
        background: var(--dark);
        color: var(--text);
        font-family: var(--font-body);
        min-height: 100vh;
        overflow-x: hidden;
      }

      body::before {
        content: '';
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background:
          radial-gradient(ellipse at 20% 20%, rgba(0, 87, 255, 0.08) 0%, transparent 60%),
          radial-gradient(ellipse at 80% 80%, rgba(0, 229, 255, 0.05) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
      }

      #root { position: relative; z-index: 1; }

      input, select, button, textarea { font-family: var(--font-body); }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--dark2); }
      ::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 3px; }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      .fade-in { animation: fadeInUp 0.4s ease forwards; }

      /* RESPONSIVE GLOBAL */
      @media (max-width: 768px) {
        body { font-size: 14px; }
        select, input { font-size: 16px !important; } /* Evite zoom iOS */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
